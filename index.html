<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=GBK">
    <title>员工码</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url("./IMG_8622.jpeg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans', sans-serif;
        }

        .zhengti {
            padding: 2rem;
            color: #E6C492;
        }

        .juzuo1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        /* Thanh tiêu đề mặc định màu xanh */
        .saomatishi {
            background-color: #2fb45e; 
            color: white;
            text-align: center;
            padding: 1.5rem 0.5rem;
            border-radius: 12px 12px 0 0;
            font-size: 1.1rem;
            transition: background-color 0.3s ease;
        }

        /* Class đổi sang màu vàng khi nhấn 3 lần */
        .bg-yellow {
            background-color: #fbbc05 !important;
            color: white !important;
        }

        .erweima {
            background-color: white;
            padding: 1.5rem;
            border-radius: 0 0 12px 12px;
            text-align: center;
            color: #333;
            position: relative;
        }

        .juzuo2 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .ewm {
            width: 75%;
            margin: 1rem auto;
        }

        .shuaxinerweima {
            color: #888;
            text-decoration: none;
            font-size: 1.1rem;
            display: block;
            margin: 1rem 0;
        }

        .yishengxiao {
            color: #2fb45e;
            font-size: 1.8rem;
            font-weight: bold;
            margin-top: 1rem;
        }

        .shijian {
            color: #2fb45e;
            font-size: 1.5rem;
        }

        .dierhang {
            margin-top: 2rem;
            color: #E6C492;
            line-height: 1.6;
            font-size: 0.95rem;
            padding: 0 1rem;
        }

        /* Hiệu ứng nhịp thở cho chữ 已生效 */
        .word_breath {
            animation: breath 2s infinite ease-in-out;
        }
        @keyframes breath {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .true { width: 100px; margin-top: 2rem; }
        .jinchang { color: #2fb45e; font-size: 1.5rem; font-weight: bold; }
    </style>
</head>

<body>
<div class="zhengti">
    <div class="juzuo1">V25094114 (Doan Nguyen Sang)</div>
    
    <div class="saomatishi" id="biaoti">将二维码对准扫描器扫码进出场</div>
    
    <div class="erweima">
        <div class="juzuo2" id="dateTime00" style="font-weight: 500;"></div>
        
        <div id="neirong">
            <img class="ewm" src="./ewm.gif">         
        </div>
        
        <div id="neirong1">    
            <a class="shuaxinerweima" href="#">刷新二维码</a>
        </div>

        <div class="yishengxiao word_breath">
            <div id="trigger-success">已生效</div>
        </div>

        <div class="shijian">
            <div id="dateTime3">00:00</div>
        </div>
    </div>

    <div class="dierhang">
        尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>
</div>

<script>
    // 1. Định dạng ngày giờ
    Date.prototype.format = function (fmt) {
        var o = {
            "y+": this.getFullYear(),
            "M+": this.getMonth() + 1,
            "d+": this.getDate(),
            "h+": this.getHours(),
            "m+": this.getMinutes(),
            "s+": this.getSeconds(),
        };
        if (/(y+)/.test(fmt)) fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
        for (var k in o)
            if (new RegExp("(" + k + ")").test(fmt)) fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
        return fmt;
    }

    // 2. Cập nhật ngày giờ liên tục
    setInterval(function () {
        const dt = document.getElementById('dateTime00');
        if (dt) dt.innerHTML = (new Date()).format('yyyy-M-d hh:mm:ss');
    }, 1000);

    // 3. LOGIC ĐỔI MÀU VÀNG (Nhấn 3 lần vào thanh tiêu đề)
    let headerClicks = [];
    const headerBar = document.getElementById('biaoti');
    headerBar.addEventListener('click', function() {
        const now = Date.now();
        headerClicks = headerClicks.filter(ts => now - ts < 2000);
        headerClicks.push(now);
        if (headerClicks.length >= 3) {
            headerBar.classList.toggle('bg-yellow'); // Bật/Tắt màu vàng
            headerClicks = [];
        }
    });

    // 4. LOGIC HIỆN DẤU TÍCH (Nhấn 5 lần vào chữ '已生效')
    let successClicks = [];
    document.getElementById('trigger-success').addEventListener('click', function() {
        const now = Date.now();
        successClicks = successClicks.filter(ts => now - ts < 3000);
        successClicks.push(now);
        if (successClicks.length >= 5) {
            changetxt();
            successClicks = []; 
        }
    });

    function changetxt() {
        headerBar.innerText = "您的设备已符合安全规范";
        document.getElementById('neirong1').style.display = "none";
        document.getElementById('neirong').innerHTML = "<img class='true' src='./true.png'><div class='truetxt'><p class='jinchang'>进场成功</p><p class='riqi' id='dateTime01'></p></div>";
        setInterval(function () {
            const dt = document.getElementById('dateTime01');
            if (dt) dt.innerHTML = (new Date()).format('yyyy-MM-dd hh:mm');
        }, 1000);
    }

    // 5. ĐỒNG HỒ ĐẾM GIỜ
    let startTime = localStorage.getItem("startTime") || Date.now();
    localStorage.setItem("startTime", startTime);

    setInterval(function () {
        let diff = Math.floor((Date.now() - startTime) / 1000);
        let hrs = Math.floor(diff / 3600);
        let mins = Math.floor((diff % 3600) / 60);
        let secs = diff % 60;
        let timeStr = (hrs > 0 ? hrs + ':' : '') + (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;
        document.getElementById('dateTime3').innerHTML = timeStr;
    }, 1000);

    // Nhấn 3 lần vào nút Refresh để reset đồng hồ
    let reloadClicks = [];
    document.querySelector('.shuaxinerweima').addEventListener('click', function (e) {
        e.preventDefault();
        const now = Date.now();
        reloadClicks = reloadClicks.filter(ts => now - ts < 5000);
        reloadClicks.push(now);
        if (reloadClicks.length >= 3) {
            startTime = Date.now();
            localStorage.setItem("startTime", startTime);
            reloadClicks = [];
        }
    });
</script>
</body>
</html>
