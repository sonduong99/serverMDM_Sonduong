<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    
    <meta name="apple-mobile-web-app-title" content="员工码">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="./icon.png">
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <style>
        body { background: url("./IMG_8622.jpeg") no-repeat center/cover fixed; }
        
        /* THANH TIÊU ĐỀ: Chữ MÀU TRẮNG, độ mảnh bình thường */
        .saomatishi { 
            background: #ffc526 !important; 
            color: #ffffff !important; 
            font-weight: 400 !important; 
            letter-spacing: normal; 
        }

        /* KHUNG TRẮNG: Ngày tháng màu ĐEN, khoảng cách 4rem */
        #dateTime00 { 
            padding-top: 4rem; 
            margin-bottom: 1rem; 
            color: #000000;
            font-weight: 500; 
        }
        
        #neirong1 { padding: 0.5rem 0 4rem; }

        /* NÚT BẤM: Chữ màu ĐEN, to 3.3rem */
        .shuaxinerweima { 
            text-decoration: none; 
            display: block; 
            color: #000000 !important; 
            margin: 0; 
            font-weight: normal; 
        }
    </style>
</head>
<body>
    <p><br><br></p>    
    <div class="zhengti">
        <div class="juzuo1">V25083002 (Son Nguyen )</div>
        
        <div class="saomatishi juzhong">将二维码对准扫描器扫码进出场</div>
        
        <div class="yuan1 yuant"></div><div class="yuan2 yuant"></div>
        
        <div class="juzhong erweima zise">
            <div id="dateTime00" class="juzuo2"></div>
            <div id="neirong"><img class="ewm" src="./ewm.gif"></div>
            <div id="neirong1">
                <a class="shuaxinerweima juzhong footsty" style="font-size: 3.3rem;" href="#">刷新二维码</a>
            </div>
        </div>
        
        <div class="dierhang">尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。</div>
    </div>

<script>
    function update() {
        const d = new Date();
        const datePart = `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
        const timePart = d.toTimeString().split(' ')[0]; 
        document.getElementById('dateTime00').innerText = `${datePart} ${timePart}`;
    }
    setInterval(update, 1000); 
    update();
    document.querySelector('.shuaxinerweima').onclick = e => {
        e.preventDefault();
        location.reload(); // Thêm dòng này để nút bấm thực sự có tác dụng làm mới
    };
</script>
</body>
</html>
